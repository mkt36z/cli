# GoReleaser configuration for mkt36z CLI
# Docs: https://goreleaser.com

version: 2

project_name: mkt36z

before:
  hooks:
    - go mod tidy

builds:
  - id: mkt36z
    main: ./cmd/mkt36z
    binary: mkt36z
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mkt36z/cli/internal/version.Version={{.Version}}
      - -X github.com/mkt36z/cli/internal/version.Commit={{.ShortCommit}}
      - -X github.com/mkt36z/cli/internal/version.Date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: mkt36z
    name: cli
  draft: false
  prerelease: auto
