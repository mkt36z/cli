name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - run: go mod download
      - run: go vet ./...
      - run: go test ./... -race -count=1
      - run: go build -o mkt36z ./cmd/mkt36z

      - uses: actions/upload-artifact@v4
        with:
          name: mkt36z-linux-amd64
          path: mkt36z
